<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>유포 통계</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  :root {
    --bg: #0a0c10;
    --surface: #111318;
    --surface2: #181c24;
    --border: #1e2330;
    --border2: #2e3a50;
    --text: #e8edf5;
    --text-dim: #8a97b0;
    --text-muted: #4a5568;
    --accent: #5b9cf6;
    --accent-dim: #1d3f6e;
    --green: #34d399;
    --green-dim: #0a4030;
    --blue: #60a5fa;
    --blue-dim: #1a3a6e;
    --orange: #fb923c;
    --orange-dim: #4a2008;
    --red: #f87171;
    --red-dim: #4a1010;
    --sans: 'Pretendard', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.3;
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    max-width: 1300px;
    margin: 0 auto;
    padding: 32px 24px;
  }

  /* 헤더 */
  .header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 32px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border2);
  }

  .header-left h1 {
    font-size: 20px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.5px;
  }

  .header-left h1 span { color: var(--accent); }

  .header-left p {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 4px;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  /* 네비 */
  .nav-link {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 6px;
    color: var(--text-dim);
    font-size: 12px;
    text-decoration: none;
    transition: all 0.15s;
  }

  .nav-link:hover { border-color: var(--accent); color: var(--accent); }

  .refresh-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 6px;
    color: var(--text-dim);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }
  .refresh-btn.loading svg { animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* 통계 카드 */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 28px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 20px;
    position: relative;
    overflow: hidden;
  }

  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }

  .stat-card.total::before { background: var(--accent); }
  .stat-card.titles::before { background: var(--green); }
  .stat-card.platforms::before { background: var(--orange); }

  .stat-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 8px;
  }

  .stat-value {
    font-size: 28px;
    font-weight: 700;
    color: #fff;
  }

  /* 2컬럼 레이아웃 */
  .two-col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }

  /* 섹션 */
  .section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }

  .section-title {
    font-size: 14px;
    font-weight: 600;
    color: #fff;
  }

  .section-badge {
    font-size: 11px;
    padding: 2px 10px;
    border-radius: 20px;
    background: var(--accent-dim);
    color: var(--accent);
    border: 1px solid var(--accent-dim);
  }

  .section-body {
    overflow-y: auto;
    max-height: 520px;
  }

  .section-body::-webkit-scrollbar { width: 4px; }
  .section-body::-webkit-scrollbar-track { background: transparent; }
  .section-body::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  /* 작품별 유포횟수 */
  .title-list { padding: 8px 0; }

  .title-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 20px;
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
    cursor: pointer;
  }

  .title-item:last-child { border-bottom: none; }
  .title-item:hover { background: var(--surface2); }

  .title-rank {
    font-size: 12px;
    font-weight: 700;
    color: var(--text-muted);
    width: 24px;
    flex-shrink: 0;
    text-align: center;
  }

  .title-rank.top1 { color: #fbbf24; }
  .title-rank.top2 { color: #94a3b8; }
  .title-rank.top3 { color: #b45309; }

  .title-bar-wrap {
    flex: 1;
    min-width: 0;
  }

  .title-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 5px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .title-bar-bg {
    height: 4px;
    background: var(--border2);
    border-radius: 2px;
    overflow: hidden;
  }

  .title-bar-fill {
    height: 100%;
    border-radius: 2px;
    background: var(--accent);
    transition: width 0.6s ease;
  }

  .title-count {
    font-size: 16px;
    font-weight: 700;
    color: var(--accent);
    flex-shrink: 0;
    min-width: 32px;
    text-align: right;
  }

  /* 분기 탭 */
  .quarter-tabs {
    display: flex;
    gap: 6px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-wrap: wrap;
  }

  .quarter-tab {
    padding: 5px 14px;
    border-radius: 5px;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--text-dim);
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .quarter-tab:hover { border-color: var(--text-dim); color: var(--text); }
  .quarter-tab.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
  .quarter-tab.disabled { opacity: 0.3; cursor: default; pointer-events: none; }

  /* 분기별 */
  .quarter-group { }

  .quarter-label {
    padding: 8px 20px;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 1;
  }

  .quarter-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 20px;
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
    cursor: pointer;
  }

  .quarter-item:hover { background: var(--surface2); }

  .quarter-item-left {
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: 0;
  }

  .quarter-item-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 220px;
  }

  .quarter-item-count {
    font-size: 14px;
    font-weight: 700;
    color: var(--orange);
    flex-shrink: 0;
  }

  .count-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 28px;
    height: 20px;
    padding: 0 6px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
  }

  .count-badge.high { background: var(--red-dim); color: var(--red); }
  .count-badge.mid { background: var(--orange-dim); color: var(--orange); }
  .count-badge.low { background: var(--blue-dim); color: var(--blue); }

  /* 로딩 */
  .loading-state {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 60px;
    color: var(--text-dim);
    font-size: 12px;
    gap: 8px;
  }

  .spinner {
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid var(--border2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  .empty-state {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 60px;
    color: var(--text-dim);
    font-size: 12px;
  }

  /* 로그 모달 */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 12px;
    width: 720px;
    max-width: 92vw;
    max-height: 80vh;
    display: flex;
    flex-direction: column;
    animation: modalIn 0.2s ease;
  }

  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.95) translateY(10px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 24px;
    border-bottom: 1px solid var(--border);
  }

  .modal-title {
    font-size: 14px;
    font-weight: 700;
    color: #fff;
  }

  .modal-title span { color: var(--accent); }

  .modal-close {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--text-dim);
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }

  .modal-close:hover { border-color: var(--red); color: var(--red); }

  .modal-body { overflow-y: auto; }
  .modal-body::-webkit-scrollbar { width: 4px; }
  .modal-body::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .log-table { width: 100%; border-collapse: collapse; }

  .log-table thead {
    position: sticky;
    top: 0;
    background: var(--surface2);
  }

  .log-table th {
    padding: 10px 20px;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    border-bottom: 1px solid var(--border);
    text-align: left;
    cursor: default;
  }

  .log-table td {
    padding: 10px 20px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    color: var(--text);
    vertical-align: middle;
  }

  .log-table tr:last-child td { border-bottom: none; }
  .log-table tbody tr:hover { background: var(--surface2); }

  .platform-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
    background: var(--surface2);
    border: 1px solid var(--border2);
    color: var(--text-dim);
    white-space: nowrap;
  }

  .log-link {
    color: var(--accent);
    text-decoration: none;
    font-size: 12px;
    max-width: 260px;
    display: block;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .log-link:hover { text-decoration: underline; }

  .modal-footer {
    padding: 12px 24px;
    border-top: 1px solid var(--border);
    font-size: 12px;
    color: var(--text-dim);
    text-align: right;
  }

  /* 토스트 */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    padding: 10px 18px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 8px;
    font-size: 12px;
    color: var(--text);
    z-index: 200;
    transform: translateY(20px);
    opacity: 0;
    transition: all 0.2s;
    pointer-events: none;
  }

  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.error { border-color: var(--red); color: var(--red); }

  @media (max-width: 900px) {
    .two-col { grid-template-columns: 1fr; }
    .stats-row { grid-template-columns: repeat(3, 1fr); }
  }
</style>
</head>
<body>

<div class="wrapper">
  <div class="header">
    <div class="header-left">
      <h1><span>//</span> 유포 통계</h1>
      <p id="last-updated">마지막 업데이트: —</p>
    </div>
    <div class="header-right">
      <a class="nav-link" href="index.html">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        크롤링 모니터링
      </a>
      <a class="nav-link" href="works.html">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
        작품 목록
      </a>
      <a class="nav-link" href="law.html">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        검색 모니터링
      </a>
      <div class="status-dot"></div>
      <button class="refresh-btn" id="refresh-btn" onclick="loadData()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
        새로고침
      </button>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat-card total">
      <div class="stat-label">전체 유포 건수</div>
      <div class="stat-value" id="stat-total">—</div>
    </div>
    <div class="stat-card titles">
      <div class="stat-label">유포 작품 수</div>
      <div class="stat-value" id="stat-titles">—</div>
    </div>
    <div class="stat-card platforms">
      <div class="stat-label">플랫폼 수</div>
      <div class="stat-value" id="stat-platforms">—</div>
    </div>
  </div>

  <div class="two-col">
    <!-- 작품별 유포횟수 -->
    <div class="section">
      <div class="section-header">
        <div class="section-title">작품별 유포횟수</div>
        <span class="section-badge" id="badge-titles">—</span>
      </div>
      <div class="section-body">
        <div class="title-list" id="title-list">
          <div class="loading-state"><span class="spinner"></span> 불러오는 중...</div>
        </div>
      </div>
    </div>

    <!-- 분기별 10회 이상 -->
    <div class="section">
      <div class="section-header">
        <div class="section-title">분기별 10회 이상 유포 작품</div>
        <span class="section-badge" id="badge-quarter">—</span>
      </div>
      <div class="quarter-tabs" id="quarter-tabs"></div>
      <div class="section-body">
        <div id="quarter-list">
          <div class="loading-state"><span class="spinner"></span> 불러오는 중...</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 로그 모달 -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">유포 로그 — <span id="modal-title"></span></div>
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
    </div>
    <div class="modal-body">
      <table class="log-table">
        <thead>
          <tr>
            <th>플랫폼</th>
            <th>날짜</th>
            <th>링크 / 텍스트</th>
          </tr>
        </thead>
        <tbody id="log-body"></tbody>
      </table>
    </div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const API_URL = 'https://script.google.com/macros/s/AKfycbxOkW4SvzB6VjHMs-uAiMt3l48OFWanVrUUonyf-Pzzlei00EUnhe0iFlE1WUbSEZUs/exec';

  let allLogs = [];
  let byTitle = [];
  let byQuarter = [];

  async function loadData() {
    const btn = document.getElementById('refresh-btn');
    btn.classList.add('loading');

    try {
      const res = await fetch(`${API_URL}?action=getPiracy`);
      const data = await res.json();

      if (data.error) throw new Error(data.error);

      allLogs = data.logs || [];
      byTitle = data.byTitle || [];
      byQuarter = data.byQuarter || [];

      updateStats();
      renderTitleList();
      renderQuarterList();

      const now = new Date().toLocaleString('ko-KR');
      document.getElementById('last-updated').textContent = `마지막 업데이트: ${now}`;
    } catch (e) {
      showToast('데이터 로드 실패: ' + e.message, 'error');
      document.getElementById('title-list').innerHTML = `<div class="empty-state">데이터를 불러올 수 없습니다.</div>`;
      document.getElementById('quarter-list').innerHTML = `<div class="empty-state">데이터를 불러올 수 없습니다.</div>`;
    } finally {
      btn.classList.remove('loading');
    }
  }

  function updateStats() {
    document.getElementById('stat-total').textContent = allLogs.length.toLocaleString();
    document.getElementById('stat-titles').textContent = byTitle.length.toLocaleString();
    const platforms = new Set(allLogs.map(l => l.platform)).size;
    document.getElementById('stat-platforms').textContent = platforms;
  }

  function renderTitleList() {
    const container = document.getElementById('title-list');
    document.getElementById('badge-titles').textContent = `총 ${byTitle.length}개`;

    if (!byTitle.length) {
      container.innerHTML = `<div class="empty-state">데이터가 없습니다.</div>`;
      return;
    }

    const max = byTitle[0].count;

    container.innerHTML = byTitle.map((item, i) => {
      const pct = Math.round((item.count / max) * 100);
      const rankClass = i === 0 ? 'top1' : i === 1 ? 'top2' : i === 2 ? 'top3' : '';
      return `
        <div class="title-item" onclick="openLog('${escapeHtml(item.title)}')">
          <div class="title-rank ${rankClass}">${i + 1}</div>
          <div class="title-bar-wrap">
            <div class="title-name" title="${escapeHtml(item.title)}">${escapeHtml(item.title)}</div>
            <div class="title-bar-bg">
              <div class="title-bar-fill" style="width:${pct}%"></div>
            </div>
          </div>
          <div class="title-count">${item.count}</div>
        </div>
      `;
    }).join('');
  }

  let selectedQuarter = null;

  function renderQuarterList() {
    const container = document.getElementById('quarter-list');
    const tabsEl = document.getElementById('quarter-tabs');

    if (!byQuarter.length) {
      tabsEl.innerHTML = '';
      document.getElementById('badge-quarter').textContent = `총 0건`;
      container.innerHTML = `<div class="empty-state">10회 이상 유포 작품이 없습니다.</div>`;
      return;
    }

    // 데이터에 있는 연도+분기 추출
    const existingKeys = new Set(byQuarter.map(i => i.quarter));

    // 연도 목록 추출
    const years = [...new Set(byQuarter.map(i => i.quarter.split('-')[0]))].sort((a, b) => b - a);

    // 탭: 연도별 1~4분기 버튼 생성
    tabsEl.innerHTML = years.map(year => {
      return [1,2,3,4].map(q => {
        const key = `${year}-Q${q}`;
        const hasData = existingKeys.has(key);
        const months = { 1:'1~3월', 2:'4~6월', 3:'7~9월', 4:'10~12월' };
        return `<button
          class="quarter-tab ${!hasData ? 'disabled' : ''} ${selectedQuarter === key ? 'active' : ''}"
          onclick="selectQuarter('${key}')"
          ${!hasData ? 'disabled' : ''}
        >${year} ${q}분기<span style="font-size:11px;opacity:0.7;margin-left:4px;">(${months[q]})</span></button>`;
      }).join('');
    }).join('');

    // 기본 선택: 현재 선택값 유지 or 가장 최근 분기
    if (!selectedQuarter || !existingKeys.has(selectedQuarter)) {
      const sorted = [...existingKeys].sort((a, b) => b.localeCompare(a));
      selectedQuarter = sorted[0];
      // 탭 active 재적용
      tabsEl.querySelectorAll('.quarter-tab').forEach(btn => {
        btn.classList.toggle('active', btn.textContent.trim().startsWith(selectedQuarter.replace('-Q', ' ').replace('Q', '') ) );
      });
      renderQuarterContent();
      return;
    }

    renderQuarterContent();
  }

  function selectQuarter(key) {
    selectedQuarter = key;
    document.querySelectorAll('.quarter-tab').forEach(btn => {
      btn.classList.remove('active');
    });
    event.currentTarget.classList.add('active');
    renderQuarterContent();
  }

  function renderQuarterContent() {
    const container = document.getElementById('quarter-list');
    const items = byQuarter.filter(i => i.quarter === selectedQuarter);

    document.getElementById('badge-quarter').textContent = `${items.length}건`;

    if (!items.length) {
      container.innerHTML = `<div class="empty-state">해당 분기 데이터가 없습니다.</div>`;
      return;
    }

    container.innerHTML = items.map(item => {
      const badgeClass = item.count >= 30 ? 'high' : item.count >= 20 ? 'mid' : 'low';
      return `
        <div class="quarter-item" onclick="openLog('${escapeHtml(item.title)}')">
          <div class="quarter-item-left">
            <div class="quarter-item-title" title="${escapeHtml(item.title)}">${escapeHtml(item.title)}</div>
          </div>
          <span class="count-badge ${badgeClass}">${item.count}회</span>
        </div>
      `;
    }).join('');
  }

  function openLog(title) {
    const logs = allLogs.filter(l => l.title === title);
    document.getElementById('modal-title').textContent = title;

    if (!logs.length) {
      document.getElementById('log-body').innerHTML =
        `<tr><td colspan="3" style="text-align:center;padding:30px;color:var(--text-dim);">로그 없음</td></tr>`;
    } else {
      const sorted = [...logs].sort((a, b) => new Date(b.date) - new Date(a.date));
      document.getElementById('log-body').innerHTML = sorted.map(l => {
        const isUrl = l.link.startsWith('http');
        const linkHtml = isUrl
          ? `<a class="log-link" href="${escapeHtml(l.link)}" target="_blank" rel="noopener">${escapeHtml(l.link)}</a>`
          : `<span style="font-size:12px;color:var(--text-dim);">${escapeHtml(l.link)}</span>`;
        return `
          <tr>
            <td><span class="platform-badge">${escapeHtml(l.platform)}</span></td>
            <td style="color:var(--text-dim);font-size:12px;">${l.date}</td>
            <td>${linkHtml}</td>
          </tr>
        `;
      }).join('');

      document.getElementById('modal-footer').textContent = `총 ${logs.length}건`;
    }

    document.getElementById('modal').classList.add('open');
  }

  function closeModal(e) {
    if (e.target === document.getElementById('modal')) closeModalDirect();
  }

  function closeModalDirect() {
    document.getElementById('modal').classList.remove('open');
  }

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function showToast(msg, type = '') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = `toast ${type} show`;
    setTimeout(() => el.classList.remove('show'), 2500);
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModalDirect();
  });

  loadData();
</script>
</body>
</html>
