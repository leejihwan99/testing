<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>크롤링 모니터링</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="stylesheet" href="css/common.css">
<link rel="stylesheet" href="css/index.css">
</head>
<body>

<div class="wrapper">
  <div class="header">
    <div class="header-left">
      <h1><span>//</span> 크롤링 모니터링</h1>
      <p id="last-updated">마지막 업데이트: —</p>
    </div>
    <div class="header-right">
      <a class="nav-link nav-current" href="index.html">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        크롤링 모니터링
      </a>
      <a class="nav-link" href="piracy.html">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        유포 통계
      </a>
      <a class="nav-link" href="works.html">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
        작품 목록
      </a>
      <a class="nav-link" href="law.html">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        검색 모니터링
      </a>
      <div class="status-dot"></div>
      <button class="refresh-btn" id="refresh-btn" onclick="loadData()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
        새로고침
      </button>
    </div>
  </div>
  <div class="stats-row">
    <div class="stat-card total">
      <div class="stat-label">전체 회원</div>
      <div class="stat-value" id="stat-total">—</div>
    </div>
    <div class="stat-card unset">
      <div class="stat-label">미설정</div>
      <div class="stat-value" id="stat-unset">—</div>
    </div>
    <div class="stat-card exception">
      <div class="stat-label">예외</div>
      <div class="stat-value" id="stat-exception">—</div>
    </div>
    <div class="stat-card monitoring">
      <div class="stat-label">모니터링</div>
      <div class="stat-value" id="stat-monitoring">—</div>
    </div>
    <div class="stat-card crawling">
      <div class="stat-label">크롤링</div>
      <div class="stat-value" id="stat-crawling">—</div>
    </div>
    <div class="stat-card blocked">
      <div class="stat-label">차단</div>
      <div class="stat-value" id="stat-blocked">—</div>
    </div>
  </div>

  <div class="filter-row">
    <span class="filter-label">필터</span>
    <button class="filter-btn active" onclick="setFilter('')" data-filter="">전체</button>
    <button class="filter-btn" onclick="setFilter('__unset__')" data-filter="__unset__">미설정</button>
    <button class="filter-btn" onclick="setFilter('예외')" data-filter="예외">예외</button>
    <button class="filter-btn" onclick="setFilter('모니터링')" data-filter="모니터링">모니터링</button>
    <button class="filter-btn" onclick="setFilter('크롤링')" data-filter="크롤링">크롤링</button>
    <button class="filter-btn" onclick="setFilter('차단')" data-filter="차단">차단</button>
    <input class="search-input" type="text" placeholder="회원번호 검색..." id="search-input" oninput="renderTable()">
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th onclick="sortBy('memberId')">회원번호 <span class="sort-icon">↕</span></th>
          <th onclick="sortBy('totalViews')">열람수 합계 <span class="sort-icon">↕</span></th>
          <th onclick="sortBy('count')">식별 횟수 <span class="sort-icon">↕</span></th>
          <th onclick="sortBy('lastDate')">마지막 식별일 <span class="sort-icon">↕</span></th>
          <th>상태</th>
          <th onclick="sortBy('blockedDate')">차단일 <span class="sort-icon">↕</span></th>
          <th>메모</th>
        </tr>
      </thead>
      <tbody id="table-body">
        <tr class="loading-row">
          <td colspan="7"><span class="spinner"></span>데이터 불러오는 중...</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<!-- 메모 모달 -->
<div class="modal-overlay" id="memo-modal" onclick="closeMemoModal(event)">
  <div class="modal" style="width:400px;">
    <div class="modal-header">
      <div class="modal-title">메모 — <span id="memo-modal-member-id"></span></div>
      <button class="modal-close" onclick="closeMemoModalDirect()">✕</button>
    </div>
    <div style="padding:20px 24px;">
      <textarea id="memo-textarea"
        style="width:100%;height:100px;background:var(--surface2);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-family:var(--sans);font-size:13px;padding:10px 12px;resize:vertical;outline:none;line-height:1.6;"
        placeholder="메모를 입력하세요..."></textarea>
      <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:12px;">
        <button onclick="closeMemoModalDirect()"
          style="padding:6px 16px;background:transparent;border:1px solid var(--border2);border-radius:6px;color:var(--text-dim);font-family:var(--sans);font-size:13px;cursor:pointer;">
          취소
        </button>
        <button onclick="saveMemo()"
          style="padding:6px 16px;background:var(--accent-dim);border:1px solid var(--accent);border-radius:6px;color:var(--accent);font-family:var(--sans);font-size:13px;cursor:pointer;">
          저장
        </button>
      </div>
    </div>
  </div>
</div>

<!-- 로그 모달 -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">식별 로그 — <span id="modal-member-id"></span></div>
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
    </div>
    <div class="modal-body">
      <table class="log-table">
        <thead>
          <tr>
            <th>회원번호</th>
            <th>열람수</th>
            <th>날짜</th>
          </tr>
        </thead>
        <tbody id="log-body"></tbody>
      </table>
    </div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<!-- 토스트 -->
<div class="toast" id="toast"></div>

<script src="js/common.js"></script>
<script src="js/index.js"></script>
</body>
</html>
