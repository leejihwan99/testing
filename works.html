<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>작품 목록</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  :root {
    --bg: #0a0c10;
    --surface: #111318;
    --surface2: #181c24;
    --border: #1e2330;
    --border2: #2e3a50;
    --text: #e8edf5;
    --text-dim: #8a97b0;
    --text-muted: #4a5568;
    --accent: #5b9cf6;
    --accent-dim: #1d3f6e;
    --green: #34d399;
    --green-dim: #0a4030;
    --red: #f87171;
    --red-dim: #4a1010;
    --yellow: #fbbf24;
    --yellow-dim: #4a3008;
    --sans: 'Pretendard', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.3;
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px 24px;
  }

  /* 헤더 */
  .header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 28px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border2);
  }

  .header-left h1 {
    font-size: 20px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.5px;
  }

  .header-left h1 span { color: var(--accent); }

  .header-left p {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 4px;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .nav-link {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 6px;
    color: var(--text-dim);
    font-size: 12px;
    text-decoration: none;
    transition: all 0.15s;
  }

  .nav-link:hover { border-color: var(--accent); color: var(--accent); }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    animation: pulse 2s infinite;
  }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .refresh-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 6px;
    color: var(--text-dim);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }
  .refresh-btn.loading svg { animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* 툴바 */
  .toolbar {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }

  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 200px;
    max-width: 360px;
  }

  .search-icon {
    position: absolute;
    left: 11px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    pointer-events: none;
  }

  .search-input {
    width: 100%;
    padding: 8px 12px 8px 34px;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 7px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s;
  }

  .search-input::placeholder { color: var(--text-muted); }
  .search-input:focus { border-color: var(--accent); }

  .count-text {
    font-size: 12px;
    color: var(--text-dim);
    margin-left: 4px;
    white-space: nowrap;
  }

  .add-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    background: var(--accent-dim);
    border: 1px solid var(--accent);
    border-radius: 7px;
    color: var(--accent);
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    margin-left: auto;
    transition: all 0.15s;
  }

  .add-btn:hover { background: var(--accent); color: #fff; }

  /* 테이블 */
  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  thead {
    background: var(--surface2);
    border-bottom: 1px solid var(--border2);
  }

  th {
    padding: 11px 16px;
    text-align: left;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-dim);
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
    transition: color 0.15s;
  }

  th:hover { color: var(--text); }
  th.sorted { color: var(--accent); }
  th .sort-icon { margin-left: 4px; opacity: 0.4; }
  th.sorted .sort-icon { opacity: 1; }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }

  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--surface2); }

  td {
    padding: 12px 16px;
    vertical-align: middle;
    font-size: 13px;
  }

  .work-title-link {
    font-weight: 600;
    color: var(--text);
    text-decoration: none;
    transition: color 0.15s;
  }

  .work-title-link:hover { color: var(--accent); text-decoration: underline; }

  .eng-title {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 2px;
  }

  .author-text {
    color: var(--text-dim);
    font-size: 13px;
  }

  .url-link {
    color: var(--accent);
    font-size: 12px;
    text-decoration: none;
    display: block;
    max-width: 260px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .url-link:hover { text-decoration: underline; }

  /* 액션 버튼 */
  .action-btns {
    display: flex;
    gap: 6px;
    opacity: 0;
    transition: opacity 0.15s;
  }

  tbody tr:hover .action-btns { opacity: 1; }

  .btn-edit, .btn-delete {
    width: 28px;
    height: 28px;
    border-radius: 5px;
    border: 1px solid var(--border2);
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.15s;
    flex-shrink: 0;
  }

  .btn-edit { color: var(--text-dim); }
  .btn-edit:hover { border-color: var(--yellow); color: var(--yellow); }

  .btn-delete { color: var(--text-dim); }
  .btn-delete:hover { border-color: var(--red); color: var(--red); }

  /* 로딩/빈 상태 */
  .loading-row td, .empty-row td {
    text-align: center;
    padding: 60px;
    color: var(--text-dim);
    font-size: 13px;
  }

  .spinner {
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid var(--border2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-right: 8px;
    vertical-align: middle;
  }

  /* 모달 공통 */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.72);
    backdrop-filter: blur(4px);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 12px;
    width: 480px;
    max-width: 92vw;
    animation: modalIn 0.2s ease;
  }

  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.95) translateY(10px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 24px;
    border-bottom: 1px solid var(--border);
  }

  .modal-title {
    font-size: 15px;
    font-weight: 700;
    color: #fff;
  }

  .modal-close {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--text-dim);
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }

  .modal-close:hover { border-color: var(--red); color: var(--red); }

  .modal-body { padding: 24px; }

  /* 폼 */
  .form-group {
    margin-bottom: 16px;
  }

  .form-label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-dim);
    margin-bottom: 6px;
    letter-spacing: 0.3px;
  }

  .form-label .required {
    color: var(--red);
    margin-left: 2px;
  }

  .form-input {
    width: 100%;
    padding: 9px 12px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 7px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s;
  }

  .form-input::placeholder { color: var(--text-muted); }
  .form-input:focus { border-color: var(--accent); }
  .form-input.error { border-color: var(--red); }

  .form-error {
    font-size: 11px;
    color: var(--red);
    margin-top: 5px;
    display: none;
  }

  .form-error.show { display: block; }

  .modal-footer {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    padding: 16px 24px;
    border-top: 1px solid var(--border);
  }

  .btn-cancel {
    padding: 8px 18px;
    background: transparent;
    border: 1px solid var(--border2);
    border-radius: 7px;
    color: var(--text-dim);
    font-family: var(--sans);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-cancel:hover { border-color: var(--text-dim); color: var(--text); }

  .btn-submit {
    padding: 8px 20px;
    background: var(--accent-dim);
    border: 1px solid var(--accent);
    border-radius: 7px;
    color: var(--accent);
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-submit:hover { background: var(--accent); color: #fff; }
  .btn-submit:disabled { opacity: 0.5; cursor: default; }

  /* 삭제 확인 모달 */
  .confirm-modal {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 12px;
    width: 380px;
    max-width: 92vw;
    padding: 28px 24px 20px;
    animation: modalIn 0.2s ease;
    text-align: center;
  }

  .confirm-icon {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: var(--red-dim);
    border: 1px solid var(--red);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 16px;
    color: var(--red);
  }

  .confirm-title {
    font-size: 15px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 8px;
  }

  .confirm-desc {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.6;
    margin-bottom: 24px;
  }

  .confirm-desc strong { color: var(--text); }

  .confirm-btns {
    display: flex;
    gap: 8px;
    justify-content: center;
  }

  .btn-confirm-delete {
    padding: 8px 22px;
    background: var(--red-dim);
    border: 1px solid var(--red);
    border-radius: 7px;
    color: var(--red);
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-confirm-delete:hover { background: var(--red); color: #fff; }

  /* 토스트 */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    padding: 10px 18px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 8px;
    font-size: 12px;
    color: var(--text);
    z-index: 200;
    transform: translateY(20px);
    opacity: 0;
    transition: all 0.2s;
    pointer-events: none;
  }

  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { border-color: var(--green); color: var(--green); }
  .toast.error { border-color: var(--red); color: var(--red); }
</style>
</head>
<body>

<div class="wrapper">
  <div class="header">
    <div class="header-left">
      <h1><span>//</span> 작품 목록</h1>
      <p id="last-updated">마지막 업데이트: —</p>
    </div>
    <div class="header-right">
      <a class="nav-link" href="index.html">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        크롤링 모니터링
      </a>
      <a class="nav-link" href="piracy.html">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        유포 통계
      </a>
      <a class="nav-link" href="law.html">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        검색 모니터링
      </a>
      <div class="status-dot"></div>
      <button class="refresh-btn" id="refresh-btn" onclick="loadData()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
        새로고침
      </button>
    </div>
  </div>

  <div class="toolbar">
    <div class="search-wrap">
      <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input class="search-input" type="text" id="search-input" placeholder="작품명, 영문명, 작가명 검색..." oninput="renderTable()">
    </div>
    <span class="count-text" id="count-text"></span>
    <button class="add-btn" onclick="openAddModal()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      작품 추가
    </button>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th onclick="sortBy('title', this)">작품명 <span class="sort-icon">↕</span></th>
          <th onclick="sortBy('engTitle', this)">영문명 <span class="sort-icon">↕</span></th>
          <th onclick="sortBy('author', this)">작가명 <span class="sort-icon">↕</span></th>
          <th>URL</th>
          <th style="width:72px;cursor:default;"></th>
        </tr>
      </thead>
      <tbody id="table-body">
        <tr class="loading-row">
          <td colspan="5"><span class="spinner"></span>데이터 불러오는 중...</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<!-- 추가/수정 모달 -->
<div class="modal-overlay" id="form-modal" onclick="closeFormModal(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="form-modal-title">작품 추가</div>
      <button class="modal-close" onclick="closeFormModalDirect()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">작품명 <span class="required">*</span></label>
        <input class="form-input" type="text" id="input-title" placeholder="작품명을 입력하세요">
        <div class="form-error" id="error-title"></div>
      </div>
      <div class="form-group">
        <label class="form-label">영문명 <span class="required">*</span></label>
        <input class="form-input" type="text" id="input-eng-title" placeholder="영문명을 입력하세요">
        <div class="form-error" id="error-eng-title"></div>
      </div>
      <div class="form-group">
        <label class="form-label">URL <span class="required">*</span></label>
        <input class="form-input" type="text" id="input-url" placeholder="https://...">
        <div class="form-error" id="error-url"></div>
      </div>
      <div class="form-group" style="margin-bottom:0">
        <label class="form-label">작가명 <span class="required">*</span></label>
        <input class="form-input" type="text" id="input-author" placeholder="작가명을 입력하세요">
        <div class="form-error" id="error-author"></div>
      </div>
    </div>
    <div class="modal-footer">
      <div class="form-error show" id="error-global" style="margin:0 auto 0 0;font-size:12px;"></div>
      <button class="btn-cancel" onclick="closeFormModalDirect()">취소</button>
      <button class="btn-submit" id="btn-submit" onclick="submitForm()">저장</button>
    </div>
  </div>
</div>

<!-- 삭제 확인 모달 -->
<div class="modal-overlay" id="delete-modal" onclick="closeDeleteModal(event)">
  <div class="confirm-modal">
    <div class="confirm-icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
    </div>
    <div class="confirm-title">작품을 삭제할까요?</div>
    <div class="confirm-desc" id="delete-desc"></div>
    <div class="confirm-btns">
      <button class="btn-cancel" onclick="closeDeleteModalDirect()">취소</button>
      <button class="btn-confirm-delete" onclick="confirmDelete()">삭제</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const API_URL = 'https://script.google.com/macros/s/AKfycbxYgOVPjSwsyAKPZ0h7bSzKChnB4rGrbIflXQ2RvdkiaUbXcMiev9xk3Ufo4qFZfqr1/exec';

  let allWorks = [];
  let sortKey = 'title';
  let sortAsc = true;
  let editingRowIndex = null;
  let deletingRowIndex = null;

  // 데이터 로드
  async function loadData() {
    const btn = document.getElementById('refresh-btn');
    btn.classList.add('loading');
    try {
      const res = await fetch(`${API_URL}?action=getWorks`);
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      allWorks = data;
      renderTable();
      const now = new Date().toLocaleString('ko-KR');
      document.getElementById('last-updated').textContent = `마지막 업데이트: ${now}`;
    } catch (e) {
      showToast('데이터 로드 실패: ' + e.message, 'error');
      document.getElementById('table-body').innerHTML =
        `<tr class="empty-row"><td colspan="5">데이터를 불러올 수 없습니다.</td></tr>`;
    } finally {
      btn.classList.remove('loading');
    }
  }

  // 정렬
  let currentSortEl = null;
  function sortBy(key, el) {
    if (sortKey === key) sortAsc = !sortAsc;
    else { sortKey = key; sortAsc = true; }
    if (currentSortEl) currentSortEl.classList.remove('sorted');
    el.classList.add('sorted');
    currentSortEl = el;
    renderTable();
  }

  // 테이블 렌더링
  function renderTable() {
    const search = document.getElementById('search-input').value.trim().toLowerCase();

    let filtered = allWorks.filter(w =>
      !search ||
      w.title.toLowerCase().includes(search) ||
      w.engTitle.toLowerCase().includes(search) ||
      w.author.toLowerCase().includes(search)
    );

    filtered.sort((a, b) => {
      const va = a[sortKey]?.toLowerCase() || '';
      const vb = b[sortKey]?.toLowerCase() || '';
      if (va < vb) return sortAsc ? -1 : 1;
      if (va > vb) return sortAsc ? 1 : -1;
      return 0;
    });

    document.getElementById('count-text').textContent =
      search ? `${filtered.length} / ${allWorks.length}개` : `총 ${allWorks.length}개`;

    const tbody = document.getElementById('table-body');

    if (!filtered.length) {
      tbody.innerHTML = `<tr class="empty-row"><td colspan="5">조건에 맞는 작품이 없습니다.</td></tr>`;
      return;
    }

    tbody.innerHTML = filtered.map(w => `
      <tr>
        <td>
          <a class="work-title-link" href="${escapeHtml(w.url)}" target="_blank" rel="noopener">${escapeHtml(w.title)}</a>
        </td>
        <td>${escapeHtml(w.engTitle)}</td>
        <td class="author-text">${escapeHtml(w.author)}</td>
        <td><a class="url-link" href="${escapeHtml(w.url)}" target="_blank" rel="noopener" title="${escapeHtml(w.url)}">${escapeHtml(w.url)}</a></td>
        <td>
          <div class="action-btns">
            <button class="btn-edit" onclick="openEditModal(${w.rowIndex})" title="수정">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            </button>
            <button class="btn-delete" onclick="openDeleteModal(${w.rowIndex}, '${escapeHtml(w.title)}', '${escapeHtml(w.engTitle)}')" title="삭제">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
            </button>
          </div>
        </td>
      </tr>
    `).join('');
  }

  // 추가 모달
  function openAddModal() {
    editingRowIndex = null;
    document.getElementById('form-modal-title').textContent = '작품 추가';
    document.getElementById('input-title').value = '';
    document.getElementById('input-eng-title').value = '';
    document.getElementById('input-url').value = '';
    document.getElementById('input-author').value = '';
    clearFormErrors();
    document.getElementById('form-modal').classList.add('open');
    setTimeout(() => document.getElementById('input-title').focus(), 100);
  }

  // 수정 모달
  function openEditModal(rowIndex) {
    const work = allWorks.find(w => w.rowIndex === rowIndex);
    if (!work) return;
    editingRowIndex = rowIndex;
    document.getElementById('form-modal-title').textContent = '작품 수정';
    document.getElementById('input-title').value = work.title;
    document.getElementById('input-eng-title').value = work.engTitle;
    document.getElementById('input-url').value = work.url;
    document.getElementById('input-author').value = work.author;
    clearFormErrors();
    document.getElementById('form-modal').classList.add('open');
    setTimeout(() => document.getElementById('input-title').focus(), 100);
  }

  function closeFormModal(e) {
    if (e.target === document.getElementById('form-modal')) closeFormModalDirect();
  }

  function closeFormModalDirect() {
    document.getElementById('form-modal').classList.remove('open');
    editingRowIndex = null;
  }

  function clearFormErrors() {
    ['title','eng-title','url','author','global'].forEach(id => {
      const el = document.getElementById(`error-${id}`);
      if (el) { el.textContent = ''; el.classList.remove('show'); }
    });
    ['input-title','input-eng-title','input-url','input-author'].forEach(id => {
      document.getElementById(id)?.classList.remove('error');
    });
  }

  // 폼 제출
  async function submitForm() {
    clearFormErrors();
    const title = document.getElementById('input-title').value.trim();
    const engTitle = document.getElementById('input-eng-title').value.trim();
    const url = document.getElementById('input-url').value.trim();
    const author = document.getElementById('input-author').value.trim();

    let hasError = false;
    if (!title) { showFieldError('title', '작품명을 입력하세요.'); hasError = true; }
    if (!engTitle) { showFieldError('eng-title', '영문명을 입력하세요.'); hasError = true; }
    if (!url) { showFieldError('url', 'URL을 입력하세요.'); hasError = true; }
    if (!author) { showFieldError('author', '작가명을 입력하세요.'); hasError = true; }
    if (hasError) return;

    const btn = document.getElementById('btn-submit');
    btn.disabled = true;
    btn.textContent = '저장 중...';

    try {
      const body = editingRowIndex
        ? { action: 'updateWork', rowIndex: editingRowIndex, title, engTitle, url, author }
        : { action: 'addWork', title, engTitle, url, author };

      const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(body) });
      const data = await res.json();

      if (!data.success) {
        const errEl = document.getElementById('error-global');
        errEl.textContent = data.error || '저장에 실패했습니다.';
        errEl.classList.add('show');
        return;
      }

      closeFormModalDirect();
      showToast(editingRowIndex ? '수정 완료' : '추가 완료', 'success');
      await loadData();
    } catch {
      const errEl = document.getElementById('error-global');
      errEl.textContent = '서버 오류가 발생했습니다.';
      errEl.classList.add('show');
    } finally {
      btn.disabled = false;
      btn.textContent = '저장';
    }
  }

  function showFieldError(id, msg) {
    const input = document.getElementById(`input-${id}`);
    const err = document.getElementById(`error-${id}`);
    if (input) input.classList.add('error');
    if (err) { err.textContent = msg; err.classList.add('show'); }
  }

  // 삭제 모달
  function openDeleteModal(rowIndex, title, engTitle) {
    deletingRowIndex = rowIndex;
    document.getElementById('delete-desc').innerHTML =
      `<strong>${title}</strong> (${engTitle})<br>삭제하면 되돌릴 수 없습니다.`;
    document.getElementById('delete-modal').classList.add('open');
  }

  function closeDeleteModal(e) {
    if (e.target === document.getElementById('delete-modal')) closeDeleteModalDirect();
  }

  function closeDeleteModalDirect() {
    document.getElementById('delete-modal').classList.remove('open');
    deletingRowIndex = null;
  }

  async function confirmDelete() {
    if (!deletingRowIndex) return;
    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify({ action: 'deleteWork', rowIndex: deletingRowIndex })
      });
      const data = await res.json();
      if (!data.success) throw new Error();
      closeDeleteModalDirect();
      showToast('삭제 완료', 'success');
      await loadData();
    } catch {
      showToast('삭제 실패', 'error');
    }
  }

  // 유틸
  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function showToast(msg, type = '') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = `toast ${type} show`;
    setTimeout(() => el.classList.remove('show'), 2500);
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      closeFormModalDirect();
      closeDeleteModalDirect();
    }
    if (e.key === 'Enter' && document.getElementById('form-modal').classList.contains('open')) {
      submitForm();
    }
  });

  loadData();
</script>
</body>
</html>
