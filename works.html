<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>작품 목록</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="stylesheet" href="css/common.css">
<link rel="stylesheet" href="css/works.css">
</head>
<body>

<div class="wrapper">
  <div class="header">
    <div class="header-left">
      <h1><span>//</span> 작품 목록</h1>
      <p id="last-updated">마지막 업데이트: —</p>
    </div>
    <div class="header-right">
      <a class="nav-link" href="index.html">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        크롤링 모니터링
      </a>
      <a class="nav-link" href="piracy.html">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        유포 통계
      </a>
      <a class="nav-link nav-current" href="works.html">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
        작품 목록
      </a>
      <a class="nav-link" href="law.html">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        검색 모니터링
      </a>
      <div class="status-dot"></div>
      <button class="refresh-btn" id="refresh-btn" onclick="loadData()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
        새로고침
      </button>
    </div>
  </div>
  <div class="toolbar">
    <div class="search-wrap">
      <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input class="search-input" type="text" id="search-input" placeholder="작품명, 영문명, 작가명 검색..." oninput="renderTable()">
    </div>
    <span class="count-text" id="count-text"></span>
    <button class="add-btn" onclick="openAddModal()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      작품 추가
    </button>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th onclick="sortBy('title', this)">작품명 <span class="sort-icon">↕</span></th>
          <th onclick="sortBy('engTitle', this)">영문명 <span class="sort-icon">↕</span></th>
          <th onclick="sortBy('author', this)">작가명 <span class="sort-icon">↕</span></th>
          <th>URL</th>
          <th style="width:72px;cursor:default;"></th>
        </tr>
      </thead>
      <tbody id="table-body">
        <tr class="loading-row">
          <td colspan="5"><span class="spinner"></span>데이터 불러오는 중...</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<!-- 추가/수정 모달 -->
<div class="modal-overlay" id="form-modal" onclick="closeFormModal(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="form-modal-title">작품 추가</div>
      <button class="modal-close" onclick="closeFormModalDirect()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">작품명 <span class="required">*</span></label>
        <input class="form-input" type="text" id="input-title" placeholder="작품명을 입력하세요">
        <div class="form-error" id="error-title"></div>
      </div>
      <div class="form-group">
        <label class="form-label">영문명 <span class="required">*</span></label>
        <input class="form-input" type="text" id="input-eng-title" placeholder="영문명을 입력하세요">
        <div class="form-error" id="error-eng-title"></div>
      </div>
      <div class="form-group">
        <label class="form-label">URL <span class="required">*</span></label>
        <input class="form-input" type="text" id="input-url" placeholder="https://...">
        <div class="form-error" id="error-url"></div>
      </div>
      <div class="form-group" style="margin-bottom:0">
        <label class="form-label">작가명 <span class="required">*</span></label>
        <input class="form-input" type="text" id="input-author" placeholder="작가명을 입력하세요">
        <div class="form-error" id="error-author"></div>
      </div>
    </div>
    <div class="modal-footer">
      <div class="form-error show" id="error-global" style="margin:0 auto 0 0;font-size:12px;"></div>
      <button class="btn-cancel" onclick="closeFormModalDirect()">취소</button>
      <button class="btn-submit" id="btn-submit" onclick="submitForm()">저장</button>
    </div>
  </div>
</div>

<!-- 삭제 확인 모달 -->
<div class="modal-overlay" id="delete-modal" onclick="closeDeleteModal(event)">
  <div class="confirm-modal">
    <div class="confirm-icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
    </div>
    <div class="confirm-title">작품을 삭제할까요?</div>
    <div class="confirm-desc" id="delete-desc"></div>
    <div class="confirm-btns">
      <button class="btn-cancel" onclick="closeDeleteModalDirect()">취소</button>
      <button class="btn-confirm-delete" onclick="confirmDelete()">삭제</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="js/common.js"></script>
<script src="js/works.js"></script>
</body>
</html>
